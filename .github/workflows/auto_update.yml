name: FanCode Auto Update
on:
  schedule:
    - cron: '*/15 * * * *' # Har 15 minute mein update hoga
  workflow_dispatch:      # Manual button bhi mil jayega

permissions:
  contents: write         # Yeh line zaroori hai push karne ke liye

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Requests
        run: pip install requests
      - name: Run Script
        run: python update_api.py
      - name: Commit and Push
        run: |
          git config --global user.name "Ajaz-Automated"
          git config --global user.email "ajaz@users.noreply.github.com"
          git add live_matches.json
          git commit -m "Update live matches: $(date)" || echo "No changes"
          git push
